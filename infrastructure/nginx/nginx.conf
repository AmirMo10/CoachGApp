user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  # Basic rate limiting (defense in depth alongside app-level throttling).
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

  upstream backend  { server backend:4000; }
  upstream frontend { server frontend:3000; }

  server {
    listen 80;
    server_name _;
    # Redirect to HTTPS in production once certs are issued.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl;
    server_name coachg.example.com;

    ssl_certificate     /etc/letsencrypt/live/coachg.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coachg.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 25m;

    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
