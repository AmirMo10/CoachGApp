# Observability stack for the coachg namespace: Prometheus, Grafana, Loki.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: coachg
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: coachg-backend
        metrics_path: /api/v1/metrics
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: backend
            action: keep
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: coachg
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.0
          args: ['--config.file=/etc/prometheus/prometheus.yml']
          ports: [{ containerPort: 9090 }]
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: prometheus, namespace: coachg }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: coachg-prometheus }
rules:
  - apiGroups: ['']
    resources: ['endpoints', 'services', 'pods']
    verbs: ['get', 'list', 'watch']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: coachg-prometheus }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: coachg-prometheus }
subjects:
  - { kind: ServiceAccount, name: prometheus, namespace: coachg }
---
apiVersion: v1
kind: Service
metadata: { name: prometheus, namespace: coachg }
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: coachg
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports: [{ containerPort: 3000 }]
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: coachg-secrets, key: JWT_SECRET } }
---
apiVersion: v1
kind: Service
metadata: { name: grafana, namespace: coachg }
spec:
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: coachg
spec:
  replicas: 1
  selector:
    matchLabels: { app: loki }
  template:
    metadata:
      labels: { app: loki }
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.1.0
          ports: [{ containerPort: 3100 }]
---
apiVersion: v1
kind: Service
metadata: { name: loki, namespace: coachg }
spec:
  selector: { app: loki }
  ports: [{ port: 3100, targetPort: 3100 }]
