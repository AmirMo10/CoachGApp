apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: coachg
spec:
  replicas: 2
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: registry.arvancloud.ir/coachg/frontend:latest
          ports: [{ containerPort: 3000 }]
          envFrom:
            - configMapRef: { name: coachg-config }
          resources:
            requests: { cpu: '100m', memory: '128Mi' }
            limits: { cpu: '500m', memory: '256Mi' }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: coachg
spec:
  selector: { app: frontend }
  ports: [{ port: 3000, targetPort: 3000 }]
