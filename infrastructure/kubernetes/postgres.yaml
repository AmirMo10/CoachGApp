# For production, prefer ArvanCloud managed PostgreSQL and point DATABASE_URL at it.
# This manifest is for self-hosted single-instance Postgres with a PVC.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata
  namespace: coachg
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: coachg
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - name: POSTGRES_DB
              value: coachg
            - name: POSTGRES_USER
              value: coachg
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: coachg-secrets, key: REDIS_PASSWORD }
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim: { claimName: pgdata }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: coachg
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
