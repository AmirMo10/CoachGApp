# Application tier for Coach"G" (ArvanCloud VM / staging).
#
# Stateful services (PostgreSQL, Redis) live in docker-compose.data.yml on the SAME
# external `coachg` network — they are intentionally NOT part of this stack so that
# building/redeploying the app (or `docker compose down -v`) never risks the database.
# For full production, prefer the Kubernetes manifests in infrastructure/kubernetes.
#
# ── Prerequisite: the data tier must already be running ──
#   docker compose -f infrastructure/docker/docker-compose.data.yml --env-file ../../.env up -d
#
# ── Build/deploy the app (safe to rebuild and tear down repeatedly) ──
#   docker compose -f infrastructure/docker/docker-compose.prod.yml --env-file ../../.env up -d --build
#
# The backend/worker reach the database via the service names `postgres` and `redis`
# on the shared network, so DATABASE_URL / REDIS_HOST in .env use those hostnames.
name: coachg-app

services:
  backend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/backend.Dockerfile
    env_file: ../../.env
    restart: unless-stopped
    networks: [coachg]

  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/backend.Dockerfile
    command: ['node', 'dist/worker.js']
    env_file: ../../.env
    restart: unless-stopped
    networks: [coachg]

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/frontend.Dockerfile
    env_file: ../../.env
    depends_on: [backend]
    restart: unless-stopped
    networks: [coachg]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on: [frontend, backend]
    restart: unless-stopped
    networks: [coachg]

# Shared with docker-compose.data.yml. Created once via `docker network create coachg`.
networks:
  coachg:
    external: true
    name: coachg
